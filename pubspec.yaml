name: word_swipe
description: Tinder-style vocabulary learning app with CEFR word levels.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  hive_flutter: ^1.1.0
  dio: ^5.7.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/words/a1_words.json
    - assets/words/a2_words.json
    - assets/words/b1_words.json
    - assets/words/b2_words.json
    - assets/words/c1_words.json
    - assets/words/c2_words.json
    - assets/insights/a1_insights.json
    - assets/insights/a2_insights.json
    - assets/insights/b1_insights.json
    - assets/insights/b2_insights.json
    - assets/insights/c1_insights.json
    - assets/insights/c2_insights.json
